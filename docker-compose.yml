services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      target: app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?queue_name=import"
      API_KEY: ${API_KEY:-change_me_super_secret_key}
      APP_SECRET: ${APP_SECRET:-2f9d8c7b6a5e4f3d2c1b0a9f8e7d6c5b}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      RUN_MIGRATIONS: "1"
    volumes:
      - ./:/var/www/html:cached
      - php_var:/var/www/html/var
      # Keep the image-built vendor/ (don't let the bind mount hide it).
      - vendor:/var/www/html/vendor

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  worker:
    build:
      context: .
      target: app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?queue_name=import"
      API_KEY: ${API_KEY:-change_me_super_secret_key}
      APP_SECRET: ${APP_SECRET:-2f9d8c7b6a5e4f3d2c1b0a9f8e7d6c5b}
      RUN_MIGRATIONS: "0"
    volumes:
      - ./:/var/www/html:cached
      - worker_var:/var/www/html/var
      - vendor:/var/www/html/vendor
    command: ["php", "bin/console", "messenger:consume", "async", "failed", "-vv", "--time-limit=3600"]
    restart: unless-stopped

volumes:
  db_data:
  php_var:
  worker_var:
  vendor:
