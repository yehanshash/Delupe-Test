; Application PHP overrides
memory_limit = 512M
max_execution_time = 120
date.timezone = UTC

; Sensible JSON / error handling
display_errors = Off
log_errors = On
error_reporting = E_ALL

; OPcache (safe defaults for both dev and prod containers)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
